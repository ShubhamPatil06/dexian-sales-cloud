<template>
    <lightning-card title=" Date Validation In Lwc">
        <div class="slds-m-around_medium">
            <div class="slds-p-bottom_xx-small"> 
                <lightning-input 
                 type="date"
                 name="startDate"
                 label="Start Date"
                 onchange={handleChange}>
                </lightning-input>
                <lightning-input 
                 type="date"
                 name="endDate"
                 label="End Date"
                 onchange={handleChange}>
                </lightning-input>
            </div>
            <template lwc:if={error}> 
                <p class="slds-text-color_destructive">{error}</p>
            </template>
            <div class="slds-p-top_xx-small">
                <lightning-button
                 variant="brand"
                 label="Submit"
                 onclick={handleSubmit}>
                </lightning-button>
            </div>
        </div>
    </lightning-card>
    
</template>
