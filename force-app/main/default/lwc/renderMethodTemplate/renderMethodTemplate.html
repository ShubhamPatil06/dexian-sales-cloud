<template>
    <lightning-card title="Rendering Multiple Templates" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
            <h2 class="slds-text-title_caps slds-text-align_left">Choose your Options :</h2>
            <div class="slds-m-around_medium">
                <lightning-button
                variant="destructive"
                label="Sign Up"
                title="Sign Up"
                onclick={handleClick}
                class="slds-m-left_medium">
               </lightning-button>
               <lightning-button
                variant="success"
                label="Sign In"
                title="Sign In"
                onclick={handleClick}
                class="slds-m-left_medium">
               </lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
