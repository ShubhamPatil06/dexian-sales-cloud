<template>
    <lightning-card title="Rendering Multiple Templates" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
        <h2 class="slds-text-title_caps slds-text-align_left">Sign In Form</h2>
        <lightning-input 
        type="text"
        label="Enter username">
        </lightning-input>
        <lightning-input 
        type="text"
        label="Enter password">
        </lightning-input>
        </div>
        <div>
            <lightning-button 
            variant="destructive"
            label="Back"
            title="Back"
            onclick={handleClick}
            class="slds-m-left_medium">
            </lightning-button>
            <lightning-button 
            variant="success"
            label="Sign In"
            title="Sign In"
            onclick={submitHandler}
            class="slds-m-left_medium">
            </lightning-button>
        </div>
    </lightning-card>
</template>
