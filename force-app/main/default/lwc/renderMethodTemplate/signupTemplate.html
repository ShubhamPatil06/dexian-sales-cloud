<template>
    <lightning-card title="Rendering Multiple Templates" icon-name="custom:custom14">
        <div class="slds-m-around_medium">
        <h2 class="slds-text-title_caps slds-text-align_left">Sign Up Form</h2>
        <lightning-input 
        type="text"
        label="Enter First Name">
        </lightning-input>
        <lightning-input 
        type="text"
        label="Enter Last Name">
        </lightning-input>
        <lightning-input 
        type="email"
        label="Enter Email">
        </lightning-input>
        <lightning-input 
        type="password"
        label="Enter Password"
        maxlength="10">
        </lightning-input> 
        </div>
        <div>
            <lightning-button 
            variant="destructive"
            label="Back"
            title="Back"
            onclick={handleClick}
            class="slds-m-left_medium">
            </lightning-button>
            <lightning-button 
            variant="success"
            label="Sign Up"
            title="Sign Up"
            onclick={submitHandler}
            class="slds-m-left_medium">
            </lightning-button>
        </div>
    </lightning-card>
</template>
