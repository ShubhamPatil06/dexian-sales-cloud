<template>
    <!--Navigate To Record Page-->
        <lightning-card title="Navigate to New Contact Record Page">
        <div class="slds-m-around_medium">
            <lightning-button
             variant="brand"
             label="Create new Contact"
             onclick={navigateToRecordPage}></lightning-button>
        </div>
    </lightning-card>
    <!--Navigate To Record Page With Default Values-->
    <lightning-card title="Navigate to New Contact Record With Default Values">
        <div class="slds-m-around_medium">
            <lightning-button
             variant="brand"
             label="New Contact With Default"
             onclick={navigateToRecordPageWithDefault}></lightning-button>
        </div>
    </lightning-card>
    <!--Navigate To List View-->
    <lightning-card title="Navigate to List View">
        <div class="slds-m-around_medium">
            <lightning-button
             variant="brand"
             label="Navigate to List Viewt"
             onclick={navigateToListView}></lightning-button>
        </div>
    </lightning-card>
    <!--Navigate To Files-->
    <lightning-card title="Navigate to Files">
        <div class="slds-m-around_medium">
            <lightning-button
             variant="brand"
             label="Navigate to Files"
             onclick={navigateToFiles}></lightning-button>
        </div>
    </lightning-card>
    
</template>
