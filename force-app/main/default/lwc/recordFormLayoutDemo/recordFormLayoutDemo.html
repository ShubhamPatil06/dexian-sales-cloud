<template>
    <lightning-card title="Edit Record using Layout In Record Form">
        <div class="slds-m-around_medium">
            <lightning-record-form
            record-id={recordId}
            object-api-name={objectApiName}
            mode="edit"
            layout-type="Compact"
            columns="2"
            onsuccess={successHandler}>
            </lightning-record-form>
        </div>
    </lightning-card>  
</template>
