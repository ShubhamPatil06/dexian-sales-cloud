<template>
    <lightning-card title="User Permission Demo">
        <div class="slds-m-around_medium">
            <template lwc:if={hasViewAllDataPermission}>
                <p class="slds-text-title_caps slds-text-color_success">Hurray! I have User Permission!!</p>
            </template>
            <template lwc:else>
                <p class="slds-text-title_caps slds-text-color_error">OOps! I don't have User Permission!!</p>
            </template>
        </div>
    </lightning-card>

    <lightning-card title="Custom Permission Demo">
        <div class="slds-m-around_medium">
            <template lwc:if={hasCustomPermission}>
                <p class="slds-text-title_caps slds-text-color_success">Hurray! I have Custom Permission!!</p>
            </template>
            <template lwc:else>
                <p class="slds-text-title_caps slds-text-color_error">OOps! I don't have Custom Permission!!</p>
            </template>
        </div>
    </lightning-card>
    
</template>
